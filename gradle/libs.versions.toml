[versions]
current = "0.1.0-beta.1"
benmanes-versions = "0.54.0"
kotlin = "2.3.21"
detekt = "1.23.8"
dokka = "2.2.0"
kotlinx-browser = "0.5.0"
kotlinx-html = "0.12.0"
ktlint-plugin = "14.2.0"
ktlint = "1.8.0"
maven-publish = "0.36.0"

[libraries]
detekt-formatting = { module = "io.gitlab.arturbosch.detekt:detekt-formatting", version.ref = "detekt" }
detekt-library = { module = "io.gitlab.arturbosch.detekt:detekt-rules-libraries", version.ref = "detekt" }
kotlinx-browser = { module = "org.jetbrains.kotlinx:kotlinx-browser", version.ref = "kotlinx-browser" }
kotlinx-html = { module = "org.jetbrains.kotlinx:kotlinx-html", version.ref = "kotlinx-html" }

[plugins]
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }
benmanes-versions = { id = "com.github.ben-manes.versions", version.ref = "benmanes-versions" }
dokka = { id = "org.jetbrains.dokka", version.ref = "dokka" }
ktlint = { id = "org.jlleitschuh.gradle.ktlint", version.ref = "ktlint-plugin" }
mavenpublish = { id = "com.vanniktech.maven.publish", version.ref = "maven-publish" }
